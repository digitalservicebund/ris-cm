<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RIS - content management</title>
  </head>
  <body>
    <main id="app">
      <div class="fallback">
        <p>Die Anwendung wird geladen...</p>
        <!-- Error container (hidden by default) -->
        <div id="error-container" hidden role="alert">
          <p id="error-title">
            Die Anwendung konnte nicht gestartet werden. Bitte versuchen Sie es
            erneut oder kontaktieren Sie den Support, falls das Problem
            weiterhin besteht.
          </p>
          <p id="error-details"></p>
          <!-- Empty by default, filled only if there is an error message -->
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
